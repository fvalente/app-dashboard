name: Build app dashboard

# Triggers are limited to schedule + manual ONLY.
# This is deliberate: secrets are never exposed to pull-request runs, so the
# token stays safe even though this repo is public.
on:
  workflow_dispatch:        # lets you run it on demand from the Actions tab
  schedule:
    - cron: "0 8 * * 1,4"   # Mon & Thu 08:00 UTC  (cron in Actions is UTC — adjust for your timezone)

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest   # Linux = 1x minute multiplier (free on public repos)
    steps:
      - name: Checkout hub repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          GH_TOKEN: ${{ secrets.REPOS_TOKEN }}   # fine-grained PAT, Contents+Metadata: read
          GH_AFFIL: "owner"                       # set to "owner,collaborator,organization_member" to include shared repos
          EXTRA_REPOS: ${{ vars.EXTRA_REPOS }}    # optional: comma-separated owner/name to force-include
          EXCLUDE_REPOS: ${{ vars.EXCLUDE_REPOS }} # optional: comma-separated owner/name to skip
        run: python build_ci.py

      # ---------- DELIVERY: email (private) ----------
      # The dashboard renders INLINE in the email body (html_body). The HTML is
      # written to be Gmail-safe (no JS / no base64 images / no SVG), so it shows
      # up directly in the message. dashboard.html + data.csv are also attached
      # as a fallback / for the raw figures.
      - name: Email the dashboard
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}   # your gmail address
          password: ${{ secrets.MAIL_PASSWORD }}   # gmail APP PASSWORD (not your login password)
          to: ${{ secrets.MAIL_TO }}               # where to send (can be your gmail)
          from: App Dashboard <${{ secrets.MAIL_USERNAME }}>
          subject: "📊 App portfolio dashboard — auto-update"
          html_body: file://output/dashboard.html  # renders the dashboard in the email body
          body: |
            Your app portfolio dashboard has been rebuilt.
            If your mail client can't show HTML, open the attached dashboard.html. Raw figures are in data.csv.
          attachments: output/dashboard.html,output/data.csv

      # ---------- DELIVERY ALTERNATIVE: push to a SEPARATE PRIVATE repo ----------
      # Prefer this over email if you'd rather browse it on GitHub (private Pages needs GitHub Pro).
      # 1) Create a private repo, e.g. fvalente/app-dashboard-output
      # 2) Give REPOS_TOKEN (or a dedicated PAT) Contents:write on it
      # 3) Delete the email step above and uncomment this block:
      #
      # - name: Publish to private output repo
      #   env:
      #     OUT_TOKEN: ${{ secrets.REPOS_TOKEN }}
      #   run: |
      #     git clone --quiet https://x-access-token:${OUT_TOKEN}@github.com/fvalente/app-dashboard-output.git out
      #     cp output/* out/
      #     cd out
      #     git config user.name "dashboard-bot"
      #     git config user.email "bot@users.noreply.github.com"
      #     git add -A
      #     git commit -m "dashboard update $(date -u +%FT%TZ)" || echo "no changes"
      #     git push --quiet
